<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Subtitle Generator</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <img src="../icons/icon128.png" class="header-icon" alt="LinguaSub">
        <h1>LinguaSub AI</h1>
      </div>
      <div class="header-actions">
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-extension" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </header>

    <div class="content">
      <div class="form-group">
        <label for="target-language">Subtitle Language</label>
        <div class="select-wrapper">
          <select id="target-language">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
            <option value="ml">Malayalam</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
          </select>
        </div>
      </div>

      <button id="generate-btn" class="primary-btn">
        <span class="btn-text">Generate Subtitles</span>
        <div class="spinner hidden" id="loading-spinner"></div>
      </button>

      <div id="status-message" class="status-msg hidden"></div>

      <div id="download-section" class="download-section hidden">
        <p>Download Subtitles</p>
        <div class="download-buttons">
          <button id="download-srt" class="secondary-btn">SRT</button>
          <button id="download-vtt" class="secondary-btn">VTT</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
